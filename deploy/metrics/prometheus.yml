# Prometheus scrape yapılandırması. Uygulama (host'ta `bun run dev`, :3000)
# /metrics endpoint'ini açar; Prometheus onu periyodik scrape eder, Grafana çizer.
#
# Uygulama container'da DEĞİL host'ta çalıştığı için host.docker.internal ile
# host'a ulaşırız (docker-compose'da extra_hosts ile Linux'ta da çözülür).
# Prod'da app container ise target onun servis adı olur.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: uniclub-app
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          app: universityClub
