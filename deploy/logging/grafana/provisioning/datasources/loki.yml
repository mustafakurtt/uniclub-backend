# Grafana açılışta Loki'yi otomatik veri kaynağı olarak tanır — arayüzde elle
# kurulum yok. Bkz. docker-compose.yml (grafana servisi) + docs/LOGLAMA.md.
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    # Docker ağı içi servis adı; host'tan değil Grafana container'ından erişilir.
    url: http://loki:3100
    isDefault: true
    editable: true
