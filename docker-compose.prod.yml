# Production stack. Dev stack'ten TAMAMEN ayrı: kendi container'ları,
# kendi volume'ları, kendi ağı. İkisi aynı makinede yan yana çalışabilir.
#
#   ./scripts/deploy-local.sh                   # önerilen yol
#   docker compose -p uniclub-prod -f docker-compose.prod.yml up -d
#
# -p uniclub-prod: proje adı. Volume'lar uniclub-prod_pgdata olur; dev'in
# pgdata'sına dokunmaz. Aynı adı her seferinde kullan, yoksa yeni volume yaratırsın.
#
# Tüm secret'lar .env.prod'dan gelir. Bu dosyada ASLA değer yazılmaz.

services:
  # ── Migration: uygulamadan ÖNCE, bir kez çalışır, biter ────
  # Prod imajında drizzle-kit yoktur; migration ayrı bir imajdan koşar.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: uniclub_prod_migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:?zorunlu}:${POSTGRES_PASSWORD:?zorunlu}@postgres:5432/${POSTGRES_DB:?zorunlu}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: uniclub-backend:${IMAGE_TAG:-local}
    container_name: uniclub_prod_app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:?zorunlu}:${POSTGRES_PASSWORD:?zorunlu}@postgres:5432/${POSTGRES_DB:?zorunlu}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET zorunlu}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST zorunlu}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-UniClub <no-reply@uniclub.local>}
      APP_URL: ${APP_URL:?APP_URL zorunlu}
      # Ters proxy (nginx/Cloudflare) arkasındaysan true.
      TRUST_PROXY: ${TRUST_PROXY:-false}
      RATE_LIMIT_DISABLED: "false"
    ports:
      # Normalde trafik reverse proxy'den (docker-compose.proxy.yml) gelir.
      # Bu port doğrudan erişim/hata ayıklama içindir ve VARSAYILAN OLARAK
      # yalnızca bu makineye açıktır — paylaşımlı bir ağda 0.0.0.0'a bind
      # etmek uygulamayı tüm ağa açar.
      - "${BIND_ADDR:-127.0.0.1}:${APP_PORT:-8080}:3000"
    # migrate BİLİNÇLİ olarak depends_on'da değil: kısa ömürlü bir container'ı
    # `compose up` orkestrasyonuna sokmak, container bitip temizlenirken
    # "No such container" hatasına ve yanlış-negatif deploy'a yol açıyor.
    # Migration'ı deploy-local.sh ayrı bir `compose run` adımıyla, uygulamadan
    # önce çalıştırır.
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: uniclub_prod_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?zorunlu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?zorunlu}
      POSTGRES_DB: ${POSTGRES_DB:?zorunlu}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # Port dışarı AÇILMAZ. Yedek almak için: docker exec uniclub_prod_postgres pg_dump ...

  redis:
    image: redis:7-alpine
    container_name: uniclub_prod_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Yalnızca YEREL prod simülasyonu için sahte SMTP ────────
  # Gerçek sunucuda bu servis çalıştırılmaz; SMTP_* gerçek sağlayıcıyı gösterir.
  #   docker compose --profile localmail ...
  mailpit:
    profiles: ["localmail"]
    image: axllent/mailpit:latest
    container_name: uniclub_prod_mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      # dev'inki 8025'te. BIND_ADDR olmadan tüm ağa açılırdı.
      - "${BIND_ADDR:-127.0.0.1}:${MAILPIT_UI_PORT:-8026}:8025"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
