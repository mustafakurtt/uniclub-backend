# Yerel geliştirme altyapısı: Postgres, Redis ve sahte SMTP.
# Uygulama container'da değil, `bun run dev` ile host'ta çalışır.
#
# Portlar VARSAYILAN OLARAK yalnızca 127.0.0.1'e açılır. "5432:5432" yazmak
# onları 0.0.0.0'a bağlar; okul/kafe gibi paylaşımlı bir ağda veritabanın
# ağdaki herkese açık demektir.

services:
  postgres:
    image: postgres:16-alpine
    container_name: uniclub_postgres
    # Bu kimlik bilgileri YALNIZCA yerel geliştirme içindir — gizli değildir.
    # Prod için bkz. docker-compose.prod.yml (tüm değerler env'den gelir).
    environment:
      POSTGRES_USER: uniclub
      POSTGRES_PASSWORD: uniclub_dev
      POSTGRES_DB: uniclub
    ports:
      - "${DEV_BIND_ADDR:-127.0.0.1}:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniclub -d uniclub"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: uniclub_redis
    ports:
      - "${DEV_BIND_ADDR:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Sahte SMTP sunucusu — GERÇEK mail göndermez, hepsini yakalar.
  # 1025: uygulamanın bağlandığı SMTP portu (env.SMTP_PORT)
  # 8025: gelen mailleri HTML'iyle görebileceğin web arayüzü → http://localhost:8025
  # Prod'a geçerken tek yapılacak: SMTP_HOST/PORT/USER/PASS'i gerçek sağlayıcıya çevirmek.
  mailpit:
    image: axllent/mailpit:latest
    container_name: uniclub_mailpit
    ports:
      - "${DEV_BIND_ADDR:-127.0.0.1}:1025:1025"
      - "${DEV_BIND_ADDR:-127.0.0.1}:8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1      # kimlik doğrulaması olmadan da kabul et
      MP_SMTP_AUTH_ALLOW_INSECURE: 1  # TLS'siz bağlantıya izin ver (yerel geliştirme)
    restart: unless-stopped

  # ─── LOG YIĞINI ────────────────────────────────────────────────────────────
  # Diğer servislerle BİRLİKTE ayağa kalkar: `docker compose up -d` hepsini başlatır.
  # Yalnızca çekirdeği istersen servisleri açıkça say:
  #     docker compose up -d postgres redis mailpit
  #
  # Akış: Bun uygulaması (host) → ./logs/app.log → Vector → Loki → Grafana.
  # Uygulama container'da olmadığı için Vector, host'un yazdığı log DOSYASINI okur
  # (LOG_FILE=./logs/app.log). Bkz. docs/LOGLAMA.md.

  # Depo: hafif, etiket-indeksli log veritabanı. Varsayılan gömülü config ile çalışır.
  loki:
    image: grafana/loki:3.1.1
    container_name: uniclub_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${DEV_BIND_ADDR:-127.0.0.1}:3100:3100"
    volumes:
      - lokidata:/loki
    restart: unless-stopped

  # Ajan: Rust ile yazılmış, yüksek performanslı, vendor-bağımsız log shipper.
  # ./logs'u salt-okunur bağlar, app.log'u tail'ler, JSON'ı parse edip Loki'ye yollar.
  vector:
    image: timberio/vector:0.40.0-alpine
    container_name: uniclub_vector
    depends_on: [loki]
    command: ["--config", "/etc/vector/vector.yaml"]
    volumes:
      - ./deploy/logging/vector.yaml:/etc/vector/vector.yaml:ro
      - ./logs:/logs:ro
      - vectordata:/var/lib/vector
    restart: unless-stopped

  # Metrik deposu: uygulamanın /metrics'ini periyodik scrape eder. Uygulama host'ta
  # (bun run dev) çalıştığı için host.docker.internal ile host'a ulaşır (extra_hosts
  # ile Linux'ta da çözülür). Bkz. deploy/metrics/prometheus.yml.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: uniclub_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    ports:
      - "${DEV_BIND_ADDR:-127.0.0.1}:9090:9090"
    volumes:
      - ./deploy/metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Arayüz: LogQL ile arama + grafik. App 3000'de olduğu için Grafana 3001'e alınır.
  # Yerelde sürtünmeyi azaltmak için anonim Admin erişimi açık (SADECE geliştirme).
  grafana:
    image: grafana/grafana:11.2.0
    container_name: uniclub_grafana
    depends_on: [loki]
    ports:
      - "${DEV_BIND_ADDR:-127.0.0.1}:3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./deploy/logging/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    restart: unless-stopped

volumes:
  pgdata:
  lokidata:
  vectordata:
  grafanadata:
  promdata:
