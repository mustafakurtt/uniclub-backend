name: Release check

# Production'a deploy BURADA olmaz.
#
# Deploy, pull-based bir ajanla yapılır (scripts/deploy-agent.sh): production
# makinesi GitHub'ı okur, en son release'i görür, CI'ının yeşil olduğunu
# doğrular ve kendini deploy eder. GitHub production makinesine hiçbir zaman
# bağlanmaz — public bir repo'da self-hosted runner, fork PR'larına makinede
# kod çalıştırma yüzeyi açardı.
#
# Bu workflow'un işi: release'e aday her commit için, prod imajının gerçekten
# derlendiğini ve ayağa kalktığını kanıtlamak. "Derlendi" yetmez; container
# migration'lardan sonra /health döndürmeli.

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: release-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    name: Build & smoke-test image
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uniclub
          POSTGRES_PASSWORD: uniclub_ci
          POSTGRES_DB: uniclub
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U uniclub -d uniclub"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=uniclub-backend:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build application image
        run: docker build --target runner -t "${{ steps.meta.outputs.tag }}" .

      # Migration'lar prod imajından DEĞİL, ayrı bir migrator imajından koşar:
      # prod imajında drizzle-kit (devDependency) yoktur ve olmamalıdır.
      - name: Build migrator image
        run: docker build --target migrator -t uniclub-migrator:ci .

      - name: Apply migrations from the migrator image
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="postgres://uniclub:uniclub_ci@localhost:5432/uniclub" \
            uniclub-migrator:ci

      - name: Run container and check /health
        run: |
          docker run -d --name smoke --network host \
            -e NODE_ENV=production -e PORT=3000 \
            -e DATABASE_URL="postgres://uniclub:uniclub_ci@localhost:5432/uniclub" \
            -e REDIS_URL="redis://localhost:6379" \
            -e JWT_SECRET="smoke-test-only" \
            -e APP_URL="http://localhost:3000" \
            -e SMTP_HOST=localhost -e SMTP_PORT=1025 -e SMTP_SECURE=false \
            -e MAIL_FROM="UniClub <ci@uniclub.local>" \
            -e RATE_LIMIT_DISABLED=false -e TRUST_PROXY=true \
            "${{ steps.meta.outputs.tag }}"

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health; then
              echo; echo "✓ Container ${i}. saniyede sağlıklı"
              docker rm -f smoke >/dev/null
              exit 0
            fi
            sleep 1
          done
          echo "✗ Container /health döndürmedi"
          docker logs smoke
          docker rm -f smoke >/dev/null
          exit 1
